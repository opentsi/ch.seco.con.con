# OpenTSI Dataset Metadata
# ========================
# Key pattern: country.provider.dataset.dimension.variable.unit
# Full key example: ch.seco.con.con.index.ks_i63_index_q.csa

# Dataset identity (required)
country: "ch"
provider: "seco"
dataset: "con_con"

# Dataset title (required)
title:
  en: "Consumer sentiment index"
  de: "Konsumentenstimmungsindex"
  fr: "Indice du climat de consommation"
  it: "Indice del clima di fiducia dei consumatori"

# Data source name (required)
source_name:
  en: "State Secretariat for Economic Affairs (SECO)"
  de: "Staatssekretariat für Wirtschaft (SECO)"
  fr: "Secrétariat d'Etat à l'économie (SECO)"
  it: "Segretaria di Stato dell'economia (SECO)"

# URL to original data source (required)
source_url: "https://www.seco.admin.ch/de/konsumentenstimmung"

# Data frequency (required)
dataset_frequency: "Q"

# Units of measurement — keyed by value of the `type` dimension
units:
  index:
    en: "Index"
    de: "Index"
    fr: "Indice"
    it: "Indice"
  sd:
    en: "Standard deviation"
    de: "Standardabweichung"
    fr: "Écart-type"
    it: "Deviazione standard"

# Aggregation method for temporal aggregation
aggregate:
  all: "mean"

# Dimension order (left to right in the key, after country.provider.dataset)
dim_order:
  - type
  - structure
  - seas_adj

# Hierarchical structure of dimensions (flat — from SECO JSON sidecar)
hierarchy:
  structure:
    ks_i63_index_q: ~
    ks_i11_econ_hist_q: ~
    ks_i12_econ_exp_q: ~
    ks_i21_price_hist_q: ~
